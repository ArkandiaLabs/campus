repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd backend && uv run ruff check --fix app tests'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && uv run ruff format app tests'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: pyright
        name: pyright
        entry: bash -c 'cd backend && uv run pyright'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && pnpm eslint src'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: tsc
        name: tsc
        entry: bash -c 'cd frontend && pnpm tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
